<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>每日闪记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8;--bg2:#EDE7D9;--bg3:#E4DDD0;--card:#FAF7F2;
  --accent:#A0855B;--accent2:#C9A87C;--accent3:#7A6148;
  --text:#3D2F22;--text2:#7A6148;--text3:#A08870;
  --border:rgba(160,133,91,0.18);
  --green:#6B8F6E;--green-bg:#EAF2EA;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:80px;}

/* 顶部 */
.header{background:linear-gradient(160deg,#C9A87C 0%,#A0855B 40%,#7A6148 100%);padding:48px 24px 28px;position:relative;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.header-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:0.04em;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;line-height:1.6;}
.settings-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.date-badge{font-size:11px;color:rgba(255,255,255,0.5);margin-top:10px;letter-spacing:0.08em;}

/* 输入区 */
.input-wrap{margin:20px 16px 0;}
.input-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:20px;}

.voice-tip{background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;}
.voice-tip-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.voice-tip-text{font-size:12.5px;color:var(--text2);line-height:1.7;}
.voice-tip-text strong{color:var(--accent3);}

.textarea-wrap{position:relative;}
.main-textarea{width:100%;min-height:120px;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:14px 50px 14px 14px;font-family:'Noto Sans SC',sans-serif;font-size:15px;color:var(--text);resize:none;outline:none;line-height:1.8;transition:border-color 0.2s;}
.main-textarea:focus{border-color:var(--accent2);}
.main-textarea::placeholder{color:var(--text3);}

.mic-trigger{position:absolute;right:10px;bottom:10px;width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(160,133,91,0.3);}
.mic-trigger:active{background:var(--accent3);transform:scale(0.93);}

.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:6px;padding-right:2px;}

.action-row{display:flex;gap:8px;margin-top:14px;}
.clear-btn{flex:0 0 auto;padding:12px 16px;background:none;border:1px solid var(--border);border-radius:12px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;}
.clear-btn:active{background:var(--bg2);}
.submit-btn{flex:1;padding:13px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:12px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 2px 12px rgba(160,133,91,0.25);}
.submit-btn:active{background:var(--accent3);}
.submit-btn:disabled{background:var(--text3);box-shadow:none;cursor:not-allowed;}

/* 快捷标签 */
.quick-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px;}
.quick-tag{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:background 0.15s;}
.quick-tag:active{background:var(--bg3);}

/* AI处理中 */
.ai-processing{display:none;margin-top:14px;background:var(--bg2);border-radius:12px;padding:14px;text-align:center;}
.ai-processing.show{display:block;}
.ai-loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:13px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:0.2s;}
.ai-dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

/* 结果卡 */
.result-card{display:none;margin-top:14px;background:#FFF8F0;border-radius:16px;border:1px solid rgba(160,133,91,0.22);overflow:hidden;}
.result-card.show{display:block;}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(160,133,91,0.12);}
.result-type-badge{font-size:12px;font-weight:500;color:var(--accent3);}
.result-actions{display:flex;gap:8px;}
.btn-save{font-size:11px;color:#fff;background:var(--green);border:none;border-radius:99px;padding:4px 12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.btn-save:active{background:#4A7A4D;}
.btn-save.saved{background:var(--text3);}
.btn-retry{font-size:11px;color:var(--accent);background:none;border:1px solid var(--border);border-radius:99px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.result-body{padding:14px;}
.result-raw{font-size:11.5px;color:var(--text3);background:var(--bg2);border-radius:8px;padding:9px 12px;line-height:1.7;margin-bottom:12px;}
.result-raw-label{font-size:10px;color:var(--text3);margin-bottom:3px;letter-spacing:0.05em;}
.result-text{font-size:14px;color:var(--text);line-height:1.85;white-space:pre-wrap;}

/* 闪记列表 */
.memos-wrap{margin:20px 16px 0;}
.memos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.memos-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
.memos-count{font-size:11px;color:var(--accent);}
.empty-tip{text-align:center;padding:30px 0;color:var(--text3);font-size:13px;line-height:1.8;}

.memo-item{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.memo-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;cursor:pointer;}
.memo-head-left{display:flex;align-items:center;gap:8px;}
.type-badge{font-size:10px;padding:2px 8px;border-radius:99px;}
.badge-todo{background:#EAE6F8;color:#5B4B99;}
.badge-diary{background:#E8F2E8;color:#4A7A4D;}
.badge-mixed{background:#F8F0E4;color:#8A6030;}
.memo-time{font-size:11px;color:var(--text3);}
.memo-del{font-size:14px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;}
.memo-preview{font-size:13px;color:var(--text2);padding:0 14px 12px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.memo-full{display:none;padding:0 14px 14px;border-top:1px solid var(--border);margin-top:2px;padding-top:12px;}
.memo-full.open{display:block;}
.memo-full-raw{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.6;}
.memo-full-text{font-size:13.5px;color:var(--text);line-height:1.85;white-space:pre-wrap;}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--text3);font-size:10px;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:20px;}

/* 设置面板 */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,47,34,0.45);z-index:100;}
.overlay.open{display:flex;align-items:flex-end;}
.settings-panel{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 44px;position:relative;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-close{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:16px;color:var(--text3);cursor:pointer;}
.panel-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.panel-sub{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6;}
.panel-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.panel-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:var(--text);outline:none;}
.panel-input:focus{border-color:var(--accent2);}
.panel-save{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.key-hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6;}
.key-status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;margin-top:6px;}
.key-ok{background:#E8F2E8;color:#4A7A4D;}
.key-no{background:#F8F0E4;color:#8A6030;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">每日闪记 ⚡</div>
      <div class="header-sub">说出来，AI 帮你整理好</div>
    </div>
    <div class="settings-btn" onclick="openSettings()">⚙</div>
  </div>
  <div class="date-badge" id="todayDate"></div>
</div>

<div class="input-wrap">
  <div class="input-card">

    <!-- 使用提示 -->
    <div class="voice-tip">
      <div class="voice-tip-icon">💡</div>
      <div class="voice-tip-text">
        点右下角 <strong>🎙 按钮</strong>，键盘会自动弹出，<br>
        点键盘上的 <strong>🎤 麦克风键</strong> 开始说话，<br>
        说完点「完成」，再点 <strong>✨ AI 整理</strong>
      </div>
    </div>

    <!-- 文字输入框 -->
    <div class="textarea-wrap">
      <textarea class="main-textarea" id="mainInput"
        placeholder="在这里说你想记录的事…&#10;&#10;比如：今天要记得开会，买水果，回家早点，还有娃的作业要检查…"></textarea>
      <button class="mic-trigger" onclick="focusInput()" title="点击唤起键盘，再按麦克风说话">🎙</button>
    </div>
    <div class="char-count" id="charCount">0 字</div>

    <!-- 快捷短语 -->
    <div class="quick-tags">
      <span class="quick-tag" onclick="appendTag('今天要记得')">📌 待办</span>
      <span class="quick-tag" onclick="appendTag('今天感觉')">💭 感受</span>
      <span class="quick-tag" onclick="appendTag('明天计划')">📅 明天</span>
      <span class="quick-tag" onclick="appendTag('不要忘了')">⚠️ 提醒</span>
    </div>

    <div class="action-row">
      <button class="clear-btn" onclick="clearInput()">清空</button>
      <button class="submit-btn" id="submitBtn" onclick="doSubmit()">✨ AI 整理</button>
    </div>

    <!-- 处理中 -->
    <div class="ai-processing" id="aiProcessing">
      <div class="ai-loading">
        <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
        <span>AI 正在整理…</span>
      </div>
    </div>

    <!-- 结果 -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="result-type-badge" id="resultTypeBadge">✅ 待办清单</span>
        <div class="result-actions">
          <button class="btn-retry" onclick="doSubmit()">重试</button>
          <button class="btn-save" id="btnSave" onclick="saveMemo()">保存</button>
        </div>
      </div>
      <div class="result-body">
        <div id="rawSection" style="display:none">
          <div class="result-raw-label">原始内容</div>
          <div class="result-raw" id="rawDisplay"></div>
        </div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>

  </div>
</div>

<!-- 今日闪记列表 -->
<div class="memos-wrap">
  <div class="memos-header">
    <span class="memos-title">今日闪记</span>
    <span class="memos-count" id="memosCount"></span>
  </div>
  <div id="memosList"></div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <a class="nav-item" href="index.html">
    <span class="nav-icon">✅</span><span>每日打卡</span>
  </a>
  <a class="nav-item active" href="memo.html">
    <span class="nav-icon">⚡</span><span>每日闪记</span>
  </a>
</div>

<!-- 设置面板 -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <button class="panel-close" onclick="closeSettings()">&#215;</button>
    <div class="panel-title">API Key 设置</div>
    <div class="panel-sub">填入你的通义千问 API Key，用于 AI 整理内容。Key 只保存在手机本地。</div>
    <div class="panel-label">通义千问 API Key</div>
    <input class="panel-input" type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx"/>
    <div class="key-hint">在 dashscope.aliyuncs.com → API Key 管理 获取。</div>
    <div id="keyStatus"></div>
    <button class="panel-save" onclick="saveApiKey()">保存</button>
  </div>
</div>

<script>
var todayKey='';
var memos=[];
var currentRaw='';
var currentStructured='';
var currentType='';

function getDateKey(){
  var d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function getTimeStr(){
  var d=new Date();
  var h=d.getHours(),m=d.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

function init(){
  todayKey=getDateKey();
  var d=new Date();
  var wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  document.getElementById('todayDate').textContent=d.getFullYear()+' · '+(d.getMonth()+1)+'月'+d.getDate()+'日 '+wd;
  loadMemos();
  renderMemos();
  // 字数统计
  document.getElementById('mainInput').addEventListener('input',function(){
    var len=this.value.length;
    document.getElementById('charCount').textContent=len+' 字';
  });
}

function focusInput(){
  var ta=document.getElementById('mainInput');
  ta.focus();
  // 移动光标到末尾
  ta.setSelectionRange(ta.value.length,ta.value.length);
}

function appendTag(text){
  var ta=document.getElementById('mainInput');
  var val=ta.value;
  if(val&&!val.endsWith('\n')&&!val.endsWith(' '))val+=' ';
  ta.value=val+text;
  ta.focus();
  ta.setSelectionRange(ta.value.length,ta.value.length);
  document.getElementById('charCount').textContent=ta.value.length+' 字';
}

function clearInput(){
  document.getElementById('mainInput').value='';
  document.getElementById('charCount').textContent='0 字';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('aiProcessing').classList.remove('show');
  currentRaw='';currentStructured='';currentType='';
}

async function doSubmit(){
  var text=document.getElementById('mainInput').value.trim();
  if(!text){alert('请先输入或说一些内容');return;}
  var apiKey=localStorage.getItem('qwen_api_key')||'';
  if(!apiKey||apiKey.length<10){alert('请先点击右上角 ⚙ 设置 API Key');return;}

  document.getElementById('submitBtn').disabled=true;
  document.getElementById('aiProcessing').classList.add('show');
  document.getElementById('resultCard').classList.remove('show');

  var prompt='你是一个高效的个人助理。用户记录了一段想法，请帮他整理。\n\n原始内容：\n'+text+'\n\n请先判断类型：\n- 待办/任务类（有要做的事情、提醒、安排）\n- 日记/感悟类（有心情、感受、经历、想法）\n- 混合类（两者都有）\n\n然后按对应格式整理，语言简洁自然：\n\n待办类输出：\n类型：待办清单\n\n【今日待办】\n- 任务1\n- 任务2\n\n日记类输出：\n类型：今日日记\n\n（用简洁流畅的语言重新表达，保留核心情感和想法，去掉口语赘词，100字以内）\n\n混合类输出：\n类型：混合记录\n\n【待办事项】\n- 任务\n\n【今日感悟】\n感悟内容\n\n只输出整理结果，不要解释。';

  try{
    var resp=await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'qwen-plus',
        messages:[
          {role:'system',content:'你是简洁高效的个人助理，帮用户整理备忘录。'},
          {role:'user',content:prompt}
        ],
        max_tokens:600
      })
    });
    if(!resp.ok){var err=await resp.json();throw new Error((err.error&&err.error.message)||'HTTP '+resp.status);}
    var data=await resp.json();
    var result=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';

    var typeMatch=result.match(/类型：(.+)/);
    var typeStr=typeMatch?typeMatch[1].trim():'记录';
    var structured=result.replace(/类型：[^\n]+\n?/,'').trim();

    currentRaw=text;
    currentStructured=structured;
    currentType=typeStr;

    var typeEmoji={'待办清单':'✅','今日日记':'📖','混合记录':'🗂️'};
    document.getElementById('resultTypeBadge').textContent=(typeEmoji[typeStr]||'📝')+' '+typeStr;
    document.getElementById('rawDisplay').textContent=text;
    document.getElementById('rawSection').style.display='block';
    document.getElementById('resultText').textContent=structured;
    document.getElementById('btnSave').textContent='保存';
    document.getElementById('btnSave').classList.remove('saved');
    document.getElementById('resultCard').classList.add('show');

  }catch(e){
    alert('整理失败：'+e.message+'\n请检查 API Key 或网络。');
  }

  document.getElementById('aiProcessing').classList.remove('show');
  document.getElementById('submitBtn').disabled=false;
}

function saveMemo(){
  if(!currentStructured)return;
  var typeMap={'待办清单':'todo','今日日记':'diary','混合记录':'mixed'};
  memos.unshift({
    id:Date.now(),
    time:getTimeStr(),
    type:typeMap[currentType]||'mixed',
    typeLabel:currentType||'记录',
    raw:currentRaw,
    structured:currentStructured
  });
  saveMemos();
  renderMemos();
  document.getElementById('btnSave').textContent='✓ 已保存';
  document.getElementById('btnSave').classList.add('saved');
  // 清空输入区
  document.getElementById('mainInput').value='';
  document.getElementById('charCount').textContent='0 字';
  currentRaw='';currentStructured='';currentType='';
  setTimeout(function(){document.getElementById('resultCard').classList.remove('show');},800);
}

function loadMemos(){
  try{var s=localStorage.getItem('memos_'+todayKey);memos=s?JSON.parse(s):[];}catch(e){memos=[];}
}
function saveMemos(){
  try{localStorage.setItem('memos_'+todayKey,JSON.stringify(memos));}catch(e){}
}

function renderMemos(){
  var list=document.getElementById('memosList');
  var count=memos.length;
  document.getElementById('memosCount').textContent=count?count+'条':'';
  if(!count){
    list.innerHTML='<div class="empty-tip">今天还没有闪记<br>快说点什么吧 ✨</div>';
    return;
  }
  list.innerHTML='';
  memos.forEach(function(memo,idx){
    var bc={todo:'badge-todo',diary:'badge-diary',mixed:'badge-mixed'}[memo.type]||'badge-mixed';
    var preview=memo.structured.replace(/\n/g,' ').substring(0,55);
    var item=document.createElement('div');
    item.className='memo-item';
    item.innerHTML=
      '<div class="memo-head" onclick="toggleMemo('+idx+')">'
        +'<div class="memo-head-left">'
          +'<span class="type-badge '+bc+'">'+memo.typeLabel+'</span>'
          +'<span class="memo-time">'+memo.time+'</span>'
        +'</div>'
        +'<button class="memo-del" onclick="delMemo(event,'+idx+')">🗑</button>'
      +'</div>'
      +'<div class="memo-preview" id="prev_'+idx+'">'+preview+(memo.structured.length>55?'…':'')+'</div>'
      +'<div class="memo-full" id="full_'+idx+'">'
        +(memo.raw?'<div class="memo-full-raw">🎙 '+memo.raw+'</div>':'')
        +'<div class="memo-full-text">'+memo.structured+'</div>'
      +'</div>';
    list.appendChild(item);
  });
}

function toggleMemo(idx){
  var full=document.getElementById('full_'+idx);
  var prev=document.getElementById('prev_'+idx);
  var open=full.classList.toggle('open');
  prev.style.display=open?'none':'';
}

function delMemo(e,idx){
  e.stopPropagation();
  if(confirm('删除这条闪记？')){memos.splice(idx,1);saveMemos();renderMemos();}
}

function openSettings(){
  document.getElementById('overlay').classList.add('open');
  var key=localStorage.getItem('qwen_api_key')||'';
  document.getElementById('apiKeyInput').value=key;
  updateKeyStatus(key);
}
function closeSettings(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSettings();}
function updateKeyStatus(key){
  var el=document.getElementById('keyStatus');
  if(key&&key.length>10){el.innerHTML='<span class="key-status key-ok">✓ Key 已配置</span>';}
  else if(key){el.innerHTML='<span class="key-status key-no">Key 太短，请检查</span>';}
  else{el.innerHTML='<span class="key-status key-no">未配置</span>';}
}
function saveApiKey(){
  var key=document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('qwen_api_key',key);
  updateKeyStatus(key);
  setTimeout(closeSettings,600);
}

init();
</script>
</body>
</html>
