<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>每日闪记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8;--bg2:#EDE7D9;--bg3:#E4DDD0;--card:#FAF7F2;
  --accent:#A0855B;--accent2:#C9A87C;--accent3:#7A6148;
  --text:#3D2F22;--text2:#7A6148;--text3:#A08870;
  --border:rgba(160,133,91,0.18);
  --red:#C0504A;--green:#6B8F6E;--green-bg:#EAF2EA;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:60px;}

/* 顶部 */
.header{background:linear-gradient(160deg,#C9A87C 0%,#A0855B 40%,#7A6148 100%);padding:48px 24px 28px;position:relative;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.header-title{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:0.04em;}
.header-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;}
.settings-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.date-badge{display:inline-block;font-size:11px;color:rgba(255,255,255,0.55);margin-top:8px;letter-spacing:0.08em;}

/* 录音区 */
.record-wrap{margin:20px 16px 0;}
.record-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:24px 20px;text-align:center;}
.record-hint{font-size:13px;color:var(--text3);margin-bottom:20px;line-height:1.6;}

.mic-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:32px;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(160,133,91,0.35);transition:transform 0.15s,box-shadow 0.15s;position:relative;}
.mic-btn:active{transform:scale(0.95);}
.mic-btn.recording{background:linear-gradient(135deg,#E07070,var(--red));box-shadow:0 4px 24px rgba(192,80,74,0.4);animation:micPulse 1.5s ease-in-out infinite;}
@keyframes micPulse{0%,100%{box-shadow:0 4px 24px rgba(192,80,74,0.4)}50%{box-shadow:0 4px 36px rgba(192,80,74,0.65),0 0 0 12px rgba(192,80,74,0.12)}}

.record-status{margin-top:14px;font-size:13px;color:var(--text3);min-height:20px;}
.record-status.active{color:var(--red);}
.record-timer{font-size:22px;font-weight:500;color:var(--accent);margin-top:6px;font-variant-numeric:tabular-nums;min-height:30px;}

.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin-top:10px;}
.wave-bar{width:4px;border-radius:2px;background:var(--accent2);opacity:0.3;transition:height 0.1s;}
.waveform.active .wave-bar{opacity:1;animation:waveDance 0.8s ease-in-out infinite;}
.wave-bar:nth-child(1){animation-delay:0s;}
.wave-bar:nth-child(2){animation-delay:0.1s;}
.wave-bar:nth-child(3){animation-delay:0.2s;}
.wave-bar:nth-child(4){animation-delay:0.3s;}
.wave-bar:nth-child(5){animation-delay:0.15s;}
.wave-bar:nth-child(6){animation-delay:0.05s;}
.wave-bar:nth-child(7){animation-delay:0.25s;}
@keyframes waveDance{0%,100%{height:6px}50%{height:24px}}

/* 文字输入备用 */
.text-input-wrap{margin-top:16px;text-align:left;}
.text-input-label{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.divider-line{flex:1;height:1px;background:var(--border);}
.text-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--text);resize:none;outline:none;line-height:1.7;}
.text-input:focus{border-color:var(--accent2);}
.text-input::placeholder{color:var(--text3);}
.submit-btn{width:100%;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;}
.submit-btn:active{background:var(--accent3);}
.submit-btn:disabled{background:var(--text3);cursor:not-allowed;}

/* AI处理区 */
.ai-processing{display:none;margin-top:16px;background:var(--bg2);border-radius:12px;padding:14px;text-align:center;}
.ai-processing.show{display:block;}
.ai-loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:13px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:0.2s;}
.ai-dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

/* 结果卡片 */
.result-card{display:none;margin-top:16px;background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.result-card.show{display:block;}
.result-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.result-type{font-size:11px;font-weight:500;color:var(--accent3);letter-spacing:0.06em;}
.result-save-btn{font-size:11px;color:#fff;background:var(--green);border:none;border-radius:99px;padding:4px 12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.result-save-btn:active{background:#4A7A4D;}
.result-save-btn.saved{background:var(--text3);}
.result-body{padding:14px;}
.result-raw{font-size:12px;color:var(--text3);background:var(--bg2);border-radius:8px;padding:10px 12px;line-height:1.7;margin-bottom:12px;}
.result-raw-label{font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:0.06em;}
.result-structured{font-size:14px;color:var(--text);line-height:1.8;white-space:pre-wrap;}

/* 今日闪记列表 */
.memos-wrap{margin:20px 16px 0;}
.memos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px;}
.memos-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
.memos-count{font-size:11px;color:var(--accent);}
.memo-item{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.memo-item-header{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.memo-item-left{display:flex;align-items:center;gap:8px;}
.memo-type-badge{font-size:10px;padding:2px 8px;border-radius:99px;}
.badge-todo{background:#EAE6F8;color:#5B4B99;}
.badge-diary{background:#E8F2E8;color:#4A7A4D;}
.badge-mixed{background:#F8F0E4;color:#8A6030;}
.memo-time{font-size:11px;color:var(--text3);}
.memo-del{font-size:14px;color:var(--text3);padding:2px 4px;cursor:pointer;background:none;border:none;}
.memo-preview{font-size:13px;color:var(--text2);padding:0 14px 12px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.memo-full{display:none;padding:0 14px 14px;}
.memo-full.open{display:block;}
.memo-full-text{font-size:13.5px;color:var(--text);line-height:1.8;white-space:pre-wrap;}
.empty-tip{text-align:center;padding:30px 0;color:var(--text3);font-size:13px;}

/* 设置面板 */
.overlay{display:none;position:fixed;inset:0;background:rgba(61,47,34,0.45);z-index:100;}
.overlay.open{display:flex;align-items:flex-end;}
.settings-panel{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 44px;position:relative;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-close{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:16px;color:var(--text3);cursor:pointer;}
.panel-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.panel-sub{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6;}
.panel-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.panel-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:var(--text);outline:none;}
.panel-input:focus{border-color:var(--accent2);}
.panel-save{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.panel-save:active{background:var(--accent3);}
.key-hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6;}
.key-status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;margin-top:6px;}
.key-ok{background:#E8F2E8;color:#4A7A4D;}
.key-no{background:#F8F0E4;color:#8A6030;}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;color:var(--text3);font-size:10px;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:20px;}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">每日闪记 ⚡</div>
      <div class="header-sub">说出来，AI 帮你整理好</div>
    </div>
    <div class="settings-btn" onclick="openSettings()">⚙</div>
  </div>
  <div class="date-badge" id="todayDate"></div>
</div>

<!-- 录音区 -->
<div class="record-wrap">
  <div class="record-card">
    <div class="record-hint">按住麦克风开始录音，说完松开<br>AI 自动识别并整理成待办或日记</div>

    <div class="mic-btn" id="micBtn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord(event)" ontouchend="stopRecord(event)">
      🎙
    </div>

    <div class="record-status" id="recordStatus">点击麦克风开始说话</div>
    <div class="record-timer" id="recordTimer"></div>

    <div class="waveform" id="waveform">
      <div class="wave-bar" style="height:8px"></div>
      <div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:20px"></div>
      <div class="wave-bar" style="height:10px"></div>
      <div class="wave-bar" style="height:18px"></div>
      <div class="wave-bar" style="height:12px"></div>
      <div class="wave-bar" style="height:8px"></div>
    </div>

    <!-- 文字备用输入 -->
    <div class="text-input-wrap">
      <div class="text-input-label">
        <div class="divider-line"></div>
        <span>或者直接打字</span>
        <div class="divider-line"></div>
      </div>
      <textarea class="text-input" id="textInput" placeholder="随手记下想法、待办、感受…" rows="3"></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitText()">✨ AI 整理</button>
    </div>

    <!-- AI处理中 -->
    <div class="ai-processing" id="aiProcessing">
      <div class="ai-loading">
        <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
        <span>AI 正在整理…</span>
      </div>
    </div>

    <!-- 结果 -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span class="result-type" id="resultType">✅ 待办清单</span>
        <button class="result-save-btn" id="saveMemoBtn" onclick="saveMemo()">保存到今日</button>
      </div>
      <div class="result-body">
        <div id="rawSection" style="display:none">
          <div class="result-raw-label">🎙 原始转录</div>
          <div class="result-raw" id="rawText"></div>
        </div>
        <div class="result-structured" id="structuredText"></div>
      </div>
    </div>
  </div>
</div>

<!-- 今日闪记 -->
<div class="memos-wrap">
  <div class="memos-header">
    <span class="memos-title">今日闪记</span>
    <span class="memos-count" id="memosCount"></span>
  </div>
  <div id="memosList"></div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <a class="nav-item" href="index.html">
    <span class="nav-icon">✅</span>
    <span>每日打卡</span>
  </a>
  <a class="nav-item active" href="memo.html">
    <span class="nav-icon">⚡</span>
    <span>每日闪记</span>
  </a>
</div>

<!-- 设置面板 -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <button class="panel-close" onclick="closeSettings()">&#215;</button>
    <div class="panel-title">API Key 设置</div>
    <div class="panel-sub">填入你的通义千问 API Key，用于语音转写和内容整理。Key 只存在手机本地。</div>
    <div class="panel-label">通义千问 API Key</div>
    <input class="panel-input" type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx"/>
    <div class="key-hint">在 dashscope.aliyuncs.com → API Key 管理 获取。</div>
    <div id="keyStatus"></div>
    <button class="panel-save" onclick="saveApiKey()">保存</button>
  </div>
</div>

<script>
var todayKey='';
var memos=[];
var mediaRecorder=null;
var audioChunks=[];
var timerInterval=null;
var recordSeconds=0;
var currentRaw='';
var currentStructured='';
var currentType='';

function getDateKey(){
  var d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function getTimeStr(){
  var d=new Date();
  var h=d.getHours(),m=d.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

function init(){
  todayKey=getDateKey();
  var d=new Date();
  var wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  document.getElementById('todayDate').textContent=d.getFullYear()+' · '+(d.getMonth()+1)+'月'+d.getDate()+'日 '+wd;
  loadMemos();
  renderMemos();
}

function loadMemos(){
  try{
    var s=localStorage.getItem('memos_'+todayKey);
    memos=s?JSON.parse(s):[];
  }catch(e){memos=[];}
}

function saveMemos(){
  try{localStorage.setItem('memos_'+todayKey,JSON.stringify(memos));}catch(e){}
}

// ── 录音 ──
function startRecord(e){
  if(e)e.preventDefault();
  if(mediaRecorder&&mediaRecorder.state==='recording')return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream,{mimeType:getSupportedMimeType()});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var blob=new Blob(audioChunks,{type:getSupportedMimeType()});
      stream.getTracks().forEach(function(t){t.stop();});
      processAudio(blob);
    };
    mediaRecorder.start(100);
    recordSeconds=0;
    updateTimer();
    timerInterval=setInterval(updateTimer,1000);
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent='⏹';
    document.getElementById('recordStatus').textContent='正在录音，松开停止';
    document.getElementById('recordStatus').classList.add('active');
    document.getElementById('waveform').classList.add('active');
  }).catch(function(err){
    alert('无法访问麦克风：'+err.message+'\n\n请在浏览器设置中允许麦克风权限，或使用下方文字输入。');
  });
}

function stopRecord(e){
  if(e)e.preventDefault();
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();
    clearInterval(timerInterval);
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent='🎙';
    document.getElementById('recordStatus').textContent='处理中…';
    document.getElementById('recordStatus').classList.remove('active');
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('recordTimer').textContent='';
  }
}

function getSupportedMimeType(){
  var types=['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4'];
  for(var i=0;i<types.length;i++){if(MediaRecorder.isTypeSupported(types[i]))return types[i];}
  return '';
}

function updateTimer(){
  var m=Math.floor(recordSeconds/60),s=recordSeconds%60;
  document.getElementById('recordTimer').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  recordSeconds++;
}

// ── 语音转文字（千问ASR）→ 结构化 ──
async function processAudio(blob){
  var apiKey=localStorage.getItem('qwen_api_key')||'';
  if(!apiKey){alert('请先点击右上角 ⚙ 设置 API Key');resetRecordUI();return;}

  showProcessing(true);

  // 千问不直接支持音频，用 Web Speech API 做本地转写，再调千问整理
  // 由于录音已结束，我们用 Web Speech API 实时转写的结果（存在 lastTranscript）
  // 如果有文字直接走整理，否则提示用文字输入
  if(window.lastTranscript&&window.lastTranscript.trim()){
    var raw=window.lastTranscript;
    window.lastTranscript='';
    await structureText(raw, true);
  } else {
    // fallback：提示用文字
    showProcessing(false);
    document.getElementById('recordStatus').textContent='转写失败，请用文字输入';
    resetRecordUI();
  }
}

// 用 Web Speech API 实时识别
var recognition=null;
var speechActive=false;

function startSpeechRecognition(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return false;
  recognition=new SR();
  recognition.lang='zh-CN';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;
  window.lastTranscript='';
  recognition.onresult=function(e){
    var final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
    }
    if(final)window.lastTranscript=(window.lastTranscript||'')+final;
  };
  recognition.onerror=function(){};
  recognition.start();
  return true;
}

// 重写录音按下：同时启动 Speech Recognition
var origStart=startRecord;
function startRecord(e){
  if(e)e.preventDefault();
  if(mediaRecorder&&mediaRecorder.state==='recording')return;
  startSpeechRecognition();
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioChunks=[];
    var mime=getSupportedMimeType();
    mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    mediaRecorder.ondataavailable=function(ev){if(ev.data.size>0)audioChunks.push(ev.data);};
    mediaRecorder.onstop=function(){
      stream.getTracks().forEach(function(t){t.stop();});
      if(recognition){try{recognition.stop();}catch(er){}}
      // 等一下让 recognition 收尾
      setTimeout(function(){
        var raw=window.lastTranscript||'';
        if(raw.trim()){
          showProcessing(true);
          structureText(raw,true);
        } else {
          document.getElementById('recordStatus').textContent='未识别到语音，请用文字输入';
          resetRecordUI();
        }
      },600);
    };
    mediaRecorder.start(100);
    recordSeconds=0;updateTimer();
    timerInterval=setInterval(updateTimer,1000);
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent='⏹';
    document.getElementById('recordStatus').textContent='正在录音，松开停止…';
    document.getElementById('recordStatus').classList.add('active');
    document.getElementById('waveform').classList.add('active');
  }).catch(function(err){
    if(recognition){try{recognition.stop();}catch(er){}}
    alert('无法访问麦克风：'+err.message+'\n请允许麦克风权限，或使用下方文字输入。');
  });
}

function stopRecord(e){
  if(e)e.preventDefault();
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();
    clearInterval(timerInterval);
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent='🎙';
    document.getElementById('recordStatus').textContent='识别中…';
    document.getElementById('recordStatus').classList.remove('active');
    document.getElementById('waveform').classList.remove('active');
    document.getElementById('recordTimer').textContent='';
  }
}

function resetRecordUI(){
  document.getElementById('recordStatus').textContent='点击麦克风开始说话';
  document.getElementById('recordStatus').classList.remove('active');
}

// ── 文字输入提交 ──
async function submitText(){
  var text=document.getElementById('textInput').value.trim();
  if(!text){alert('请先输入内容');return;}
  var apiKey=localStorage.getItem('qwen_api_key')||'';
  if(!apiKey){alert('请先点击右上角 ⚙ 设置 API Key');return;}
  showProcessing(true);
  document.getElementById('submitBtn').disabled=true;
  await structureText(text,false);
  document.getElementById('submitBtn').disabled=false;
}

// ── 核心：调千问整理 ──
async function structureText(rawText, fromVoice){
  var apiKey=localStorage.getItem('qwen_api_key')||'';
  currentRaw=rawText;

  var prompt='你是一个高效的个人助理。用户刚刚用语音/文字记录了一段想法，请帮他整理。\n\n原始内容：\n'+rawText+'\n\n请先判断这段内容属于哪种类型：\n- 待办/任务类（有"要做、需要、记得、别忘了、安排"等意图）\n- 日记/感悟类（有心情、感受、经历、想法）\n- 混合类（两者都有）\n\n然后按对应格式整理输出：\n\n如果是待办类，输出格式：\n类型：待办清单\n\n【今日待办】\n- （任务1）\n- （任务2）\n...\n\n如果是日记类，输出格式：\n类型：今日日记\n\n（用简洁流畅的语言重新表达，保留核心情感和想法，去掉口语化赘词，100字以内）\n\n如果是混合类，输出格式：\n类型：混合记录\n\n【待办事项】\n- （任务）\n\n【今日感悟】\n（感悟内容）\n\n只输出整理结果，不要解释，不要其他内容。';

  try{
    var resp=await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'qwen-plus',
        messages:[
          {role:'system',content:'你是一个简洁高效的个人助理，帮用户整理语音备忘录。'},
          {role:'user',content:prompt}
        ],
        max_tokens:600
      })
    });
    if(!resp.ok){var err=await resp.json();throw new Error((err.error&&err.error.message)||'HTTP '+resp.status);}
    var data=await resp.json();
    var result=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';

    // 解析类型
    var typeMatch=result.match(/类型：(.+)/);
    var typeStr=typeMatch?typeMatch[1].trim():'记录';
    var structured=result.replace(/类型：.+\n?/,'').trim();

    currentType=typeStr;
    currentStructured=structured;

    showProcessing(false);
    showResult(rawText, structured, typeStr, fromVoice);
    if(fromVoice)document.getElementById('recordStatus').textContent='点击麦克风开始说话';
  }catch(e){
    showProcessing(false);
    alert('整理失败：'+e.message);
    if(fromVoice)resetRecordUI();
  }
}

function showProcessing(show){
  document.getElementById('aiProcessing').classList[show?'add':'remove']('show');
  if(show){
    document.getElementById('resultCard').classList.remove('show');
  }
}

function showResult(raw, structured, type, fromVoice){
  var typeEmoji={'待办清单':'✅','今日日记':'📖','混合记录':'🗂️'};
  var emoji=typeEmoji[type]||'📝';
  document.getElementById('resultType').textContent=emoji+' '+type;

  if(fromVoice&&raw){
    document.getElementById('rawSection').style.display='block';
    document.getElementById('rawText').textContent=raw;
  } else {
    document.getElementById('rawSection').style.display='none';
  }
  document.getElementById('structuredText').textContent=structured;
  document.getElementById('saveMemoBtn').textContent='保存到今日';
  document.getElementById('saveMemoBtn').classList.remove('saved');
  document.getElementById('resultCard').classList.add('show');
}

function saveMemo(){
  if(!currentStructured)return;
  var typeMap={'待办清单':'todo','今日日记':'diary','混合记录':'mixed'};
  var memo={
    id:Date.now(),
    time:getTimeStr(),
    type:typeMap[currentType]||'mixed',
    typeLabel:currentType||'记录',
    raw:currentRaw,
    structured:currentStructured
  };
  memos.unshift(memo);
  saveMemos();
  renderMemos();
  document.getElementById('saveMemoBtn').textContent='✓ 已保存';
  document.getElementById('saveMemoBtn').classList.add('saved');
  // 清空输入
  document.getElementById('textInput').value='';
  currentRaw='';currentStructured='';currentType='';
}

function renderMemos(){
  var list=document.getElementById('memosList');
  document.getElementById('memosCount').textContent=memos.length?memos.length+'条':'';
  if(!memos.length){
    list.innerHTML='<div class="empty-tip">今天还没有闪记，快说点什么吧 ✨</div>';
    return;
  }
  list.innerHTML='';
  memos.forEach(function(memo,idx){
    var badgeClass={todo:'badge-todo',diary:'badge-diary',mixed:'badge-mixed'}[memo.type]||'badge-mixed';
    var preview=memo.structured.replace(/\n/g,' ').substring(0,50);
    var item=document.createElement('div');
    item.className='memo-item';
    item.innerHTML=
      '<div class="memo-item-header" onclick="toggleMemo('+idx+')">'
        +'<div class="memo-item-left">'
          +'<span class="memo-type-badge '+badgeClass+'">'+memo.typeLabel+'</span>'
          +'<span class="memo-time">'+memo.time+'</span>'
        +'</div>'
        +'<button class="memo-del" onclick="deleteMemo(event,'+idx+')">🗑</button>'
      +'</div>'
      +'<div class="memo-preview" id="preview_'+idx+'">'+preview+'…</div>'
      +'<div class="memo-full" id="full_'+idx+'">'
        +(memo.raw?'<div style="font-size:11px;color:var(--text3);margin-bottom:6px;">🎙 '+memo.raw+'</div>':'')
        +'<div class="memo-full-text">'+memo.structured+'</div>'
      +'</div>';
    list.appendChild(item);
  });
}

function toggleMemo(idx){
  var preview=document.getElementById('preview_'+idx);
  var full=document.getElementById('full_'+idx);
  var isOpen=full.classList.contains('open');
  full.classList.toggle('open',!isOpen);
  preview.style.display=isOpen?'':'none';
}

function deleteMemo(e,idx){
  e.stopPropagation();
  if(confirm('删除这条闪记？')){
    memos.splice(idx,1);
    saveMemos();
    renderMemos();
  }
}

// ── 设置 ──
function openSettings(){
  document.getElementById('overlay').classList.add('open');
  var key=localStorage.getItem('qwen_api_key')||'';
  document.getElementById('apiKeyInput').value=key;
  updateKeyStatus(key);
}
function closeSettings(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSettings();}
function updateKeyStatus(key){
  var el=document.getElementById('keyStatus');
  if(key&&key.length>10){el.innerHTML='<span class="key-status key-ok">✓ Key 已配置</span>';}
  else if(key){el.innerHTML='<span class="key-status key-no">Key 太短，请检查</span>';}
  else{el.innerHTML='<span class="key-status key-no">未配置</span>';}
}
function saveApiKey(){
  var key=document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('qwen_api_key',key);
  updateKeyStatus(key);
  setTimeout(closeSettings,600);
}

init();
</script>
