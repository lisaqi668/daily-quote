<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>我的每日清单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--bg2:#EDE7D9;--bg3:#E4DDD0;--card:#FAF7F2;--accent:#A0855B;--accent2:#C9A87C;--accent3:#7A6148;--text:#3D2F22;--text2:#7A6148;--text3:#A08870;--check:#6B8F6E;--check-bg:#EAF2EA;--border:rgba(160,133,91,0.18);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:40px;}
.quote-hero{position:relative;background:linear-gradient(160deg,#C9A87C 0%,#A0855B 40%,#7A6148 100%);padding:44px 28px 36px;overflow:hidden;min-height:220px;display:flex;flex-direction:column;justify-content:flex-end;}
.quote-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);}
.quote-hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.05);}
.quote-date{font-family:'Lora',serif;font-size:12px;color:rgba(255,255,255,0.65);letter-spacing:0.12em;margin-bottom:16px;}
.quote-mark{font-family:'Lora',serif;font-size:52px;line-height:1;color:rgba(255,255,255,0.2);margin-bottom:-8px;font-style:italic;}
.quote-zh{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:500;color:#fff;line-height:1.7;margin-bottom:10px;position:relative;z-index:1;}
.quote-en{font-family:'Lora',serif;font-style:italic;font-size:12.5px;color:rgba(255,255,255,0.72);line-height:1.6;margin-bottom:14px;position:relative;z-index:1;}
.quote-author{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.08em;position:relative;z-index:1;}
.quote-nav{position:absolute;top:18px;right:20px;display:flex;gap:8px;z-index:2;}
.quote-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.quote-btn:active{background:rgba(255,255,255,0.25);}
.settings-btn{position:absolute;top:18px;left:20px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.progress-bar-wrap{background:var(--bg2);padding:14px 20px 10px;border-bottom:1px solid var(--border);}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.progress-label{font-size:12px;color:var(--text3);}
.progress-count{font-size:12px;font-weight:500;color:var(--accent);}
.progress-track{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 0.4s ease;}
.ai-card{margin:16px 14px 0;background:#FFF8F0;border-radius:16px;border:1px solid rgba(160,133,91,0.25);overflow:hidden;}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid rgba(160,133,91,0.12);}
.ai-title{font-size:12px;font-weight:500;color:var(--accent3);letter-spacing:0.06em;}
.ai-btn{font-family:'Noto Sans SC',sans-serif;font-size:11px;color:var(--card);background:var(--accent);border:none;border-radius:99px;padding:5px 13px;cursor:pointer;}
.ai-btn:active{background:var(--accent3);}
.ai-btn:disabled{background:var(--text3);cursor:not-allowed;}
.ai-body{padding:12px 14px;min-height:60px;}
.ai-text{font-size:13.5px;color:var(--text);line-height:1.8;white-space:pre-wrap;}
.ai-placeholder{font-size:13px;color:var(--text3);line-height:1.7;}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:0.2s;}
.ai-dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}
.section{margin:16px 14px 0;}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 4px;}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-name{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;}
.task-card{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:7px;display:flex;align-items:flex-start;padding:12px 14px;gap:12px;cursor:pointer;user-select:none;}
.task-card:active{background:var(--bg2);}
.task-card.done{opacity:0.55;}
.task-check{width:22px;height:22px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;margin-top:1px;}
.task-card.done .task-check{background:var(--check-bg);border-color:var(--check);}
.task-check svg{display:none;}
.task-card.done .task-check svg{display:block;}
.task-body{flex:1;}
.task-time{font-size:11px;color:var(--text3);margin-bottom:2px;}
.task-label{font-size:14.5px;color:var(--text);line-height:1.5;}
.task-card.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-note{font-size:11.5px;color:var(--text3);margin-top:3px;line-height:1.5;}
.task-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle;line-height:1.4;}
.tag-health{background:#E8F2E8;color:#4A7A4D;}
.tag-learn{background:#EAE6F8;color:#5B4B99;}
.tag-beauty{background:#F8EAF0;color:#8F4A6E;}
.tag-eat{background:#F8F0E4;color:#8A6030;}
.tag-family{background:#EAF0F8;color:#3A608A;}
.principles{margin:16px 14px 0;background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;}
.principles-title{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;}
.pill-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.pill{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--border);color:var(--text2);background:var(--bg2);}
.summary-wrap{margin:16px 14px 0;}
.summary-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:8px;padding-left:4px;}
.summary-box{width:100%;min-height:100px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--text);resize:none;outline:none;line-height:1.7;}
.summary-box::placeholder{color:var(--text3);}
.summary-box:focus{border-color:var(--accent2);}
.reset-row{display:flex;justify-content:center;margin:20px 14px 0;}
.reset-btn{font-family:'Noto Sans SC',sans-serif;font-size:12px;color:var(--text3);background:none;border:1px dashed var(--border);border-radius:99px;padding:7px 20px;cursor:pointer;}
.footer{text-align:center;margin-top:28px;padding-bottom:10px;font-size:11px;color:var(--text3);letter-spacing:0.05em;}
.overlay{display:none;position:fixed;inset:0;background:rgba(61,47,34,0.45);z-index:100;}
.overlay.open{display:flex;align-items:flex-end;}
.settings-panel{width:100%;max-width:430px;margin:0 auto;background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 40px;animation:slideUp 0.25s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.panel-sub{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.6;}
.panel-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.panel-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:var(--text);outline:none;}
.panel-input:focus{border-color:var(--accent2);}
.panel-save{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Noto Sans SC',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.panel-save:active{background:var(--accent3);}
.panel-close{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:16px;color:var(--text3);cursor:pointer;}
.key-hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6;}
.key-status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;margin-top:6px;}
.key-ok{background:#E8F2E8;color:#4A7A4D;}
.key-no{background:#F8F0E4;color:#8A6030;}
</style>
</head>
<body>

<div class="quote-hero">
  <div class="settings-btn" onclick="openSettings()">⚙</div>
  <div class="quote-nav">
    <div class="quote-btn" onclick="prevQuote()">&#8249;</div>
    <div class="quote-btn" onclick="nextQuote()">&#8250;</div>
  </div>
  <div class="quote-date" id="todayDate"></div>
  <div class="quote-mark">"</div>
  <div class="quote-zh" id="qZh"></div>
  <div class="quote-en" id="qEn"></div>
  <div class="quote-author" id="qAuthor"></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-top">
    <span class="progress-label">今日完成进度</span>
    <span class="progress-count" id="progressText">0 / 0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="ai-card">
  <div class="ai-header">
    <span class="ai-title">&#10024; 昨日复盘</span>
    <button class="ai-btn" id="aiGenBtn" onclick="generateAISummary()">生成总结</button>
  </div>
  <div class="ai-body" id="aiBody">
    <div class="ai-placeholder">点击「生成总结」，AI 根据昨天打卡数据自动复盘，哪里做得好、哪里需要改进，最后给你加油打气 🌱</div>
  </div>
</div>

<div id="taskList"></div>

<div class="principles">
  <div class="principles-title">每日核心原则</div>
  <div class="pill-wrap">
    <span class="pill">管住嘴，不乱吃</span>
    <span class="pill">禁冷冻食品</span>
    <span class="pill">每天听英语</span>
    <span class="pill">读书非小说</span>
    <span class="pill">定期护肤</span>
    <span class="pill">喝白茶/姜茶</span>
    <span class="pill">22:30前入睡</span>
    <span class="pill">健康第一</span>
  </div>
</div>

<div class="summary-wrap">
  <div class="summary-label">今日记录</div>
  <textarea class="summary-box" id="summaryBox" placeholder="记录今天的感受、收获或明日计划…" rows="4"></textarea>
</div>

<div class="reset-row">
  <button class="reset-btn" onclick="confirmReset()">&#128260; 重置今日打卡</button>
</div>
<div class="footer" style="margin-bottom:70px">愿每一天都有小小进步 ✦</div>

<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding:10px 0 20px;z-index:50;"><a href="index.html" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--accent);font-size:10px;"><span style="font-size:20px;">✅</span><span>每日打卡</span></a><a href="memo.html" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--text3);font-size:10px;"><span style="font-size:20px;">⚡</span><span>每日闪记</span></a></div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="settings-panel">
    <button class="panel-close" onclick="closeSettings()">&#215;</button>
    <div class="panel-title">API Key 设置</div>
    <div class="panel-sub">填入你的通义千问 API Key，用于生成昨日 AI 复盘。Key 只保存在你的手机本地，不会上传任何服务器。</div>
    <div class="panel-label">通义千问 API Key</div>
    <input class="panel-input" type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx" />
    <div class="key-hint">在 dashscope.aliyuncs.com → API Key 管理 获取。</div>
    <div id="keyStatus"></div>
    <button class="panel-save" onclick="saveApiKey()">保存</button>
  </div>
</div>

<script>
var QUOTES=[
  {zh:"成功是一系列小努力的总和，坚持每一天。",en:"Success is the sum of small efforts, repeated day in and day out.",author:"— 罗伯特·科利尔 Robert Collier"},
  {zh:"你现在拥有的，曾经是你梦寐以求的。",en:"What you have now is what you once prayed for.",author:"— 塔木德 Talmud"},
  {zh:"不要等待机会，创造机会。",en:"Don't wait for opportunity. Create it.",author:"— 萧伯纳 George Bernard Shaw"},
  {zh:"健康不是一切，但没有健康就没有一切。",en:"Health is not everything, but without health, everything is nothing.",author:"— 叔本华 Schopenhauer"},
  {zh:"每一个不曾起舞的日子，都是对生命的辜负。",en:"Every day that passes without dancing is a wasted day.",author:"— 尼采 Nietzsche"},
  {zh:"自律给我自由。",en:"Discipline gives me freedom.",author:"— 约各布·威林克 Jocko Willink"},
  {zh:"先相信自己，然后别人才会相信你。",en:"Believe in yourself first, then others will believe in you.",author:"— 罗曼·罗兰 Romain Rolland"},
  {zh:"你的身体是你灵魂的神殿，好好照顾它。",en:"Your body is the temple of your soul. Take care of it.",author:"— 科艾略 Paulo Coelho"},
  {zh:"种一棵树最好的时间是十年前，其次是现在。",en:"The best time to plant a tree was 10 years ago. The second best time is now.",author:"— 中国谚语"},
  {zh:"生活不是等待风暴过去，而是学会在雨中起舞。",en:"Life is not about waiting for the storm to pass, but learning to dance in the rain.",author:"— 薇薇安·格林 Vivian Greene"},
  {zh:"把每一个平凡的日子，过成不平凡的一天。",en:"Make every ordinary day an extraordinary one.",author:"— 佚名"},
  {zh:"你比你想象的更强大。",en:"You are stronger than you think.",author:"— 佚名"}
];

var SECTIONS=[
  {name:"🌅 早晨",dot:"#E8A84A",tasks:[
    {time:"07:00",label:"起床",note:"开车路上听英语口语 / TED演讲",tag:"learn"},
    {time:"07:30",label:"吃早饭 + 喝白茶/姜茶",note:"忌冷冻食品，管住嘴",tag:"eat"},
    {time:"08:00",label:"化妆",tag:"beauty"},
    {time:"08:30",label:"出门",note:"车上听英语 / TED / 外刊，不停下来",tag:"learn"}
  ]},
  {name:"💼 上午",dot:"#5B8AC9",tasks:[
    {time:"09:00",label:"到公司"},
    {time:"09:05",label:"练八段锦（约20分钟）",tag:"health"},
    {time:"09:30",label:"晨会 / 带班安排工作"},
    {time:"09:30–11:00",label:"正常工作，间隙看书/学习",note:"不看小说",tag:"learn"}
  ]},
  {name:"🥗 午间",dot:"#5A9A70",tasks:[
    {time:"11:00",label:"腹部训练（15–20分钟）",tag:"health"},
    {time:"12:00",label:"吃午饭（15分钟内吃完）",note:"不吃冷冻食品",tag:"eat"},
    {time:"12:15",label:"饭后散步10分钟",tag:"health"},
    {time:"12:25",label:"手臂训练（约15分钟）",tag:"health"},
    {time:"12:40",label:"午休"}
  ]},
  {name:"🌤 下午",dot:"#9A7ACB",tasks:[
    {time:"小夜",label:"正常工作 + 学习/读书",note:"听外刊，听演讲，不看小说",tag:"learn"},
    {time:"16:30",label:"吃一个小苹果",tag:"eat"}
  ]},
  {name:"🌙 晚上",dot:"#C87AAA",tasks:[
    {time:"18:30",label:"下班回家",note:"路上继续听英语",tag:"learn"},
    {time:"19:00+",label:"吃晚饭（少吃，以米饭为主）",note:"绝不吃冷冻食品",tag:"eat"},
    {time:"饭后",label:"陪娃写作业",tag:"family"},
    {time:"20:00",label:"带娃户外运动（排腿拉直等）",tag:"health"}
  ]},
  {name:"🌛 睡前",dot:"#C08070",tasks:[
    {time:"21:00",label:"洗漱（约10分钟）"},
    {time:"洗后",label:"护肤 / 热敷 / 敷面膜（定期）",tag:"beauty"},
    {time:"22:30",label:"放下手机，上床睡觉",note:"不看手机，8.5小时睡眠目标"}
  ]}
];

var TAG_MAP={health:"健康",learn:"学习",beauty:"美容",eat:"饮食",family:"家庭"};
var todayKey='',state={},quoteIdx=0;

function getDateKey(offset){
  offset=offset||0;
  var d=new Date(); d.setDate(d.getDate()+offset);
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function loadState(){
  todayKey=getDateKey();
  try{
    var saved=localStorage.getItem('tracker_'+todayKey);
    state=saved?JSON.parse(saved):{checks:{},summary:'',quoteIdx:Math.floor(Math.random()*QUOTES.length)};
    quoteIdx=state.quoteIdx||0;
  }catch(e){state={checks:{},summary:'',quoteIdx:0};}
}

function saveState(){
  state.quoteIdx=quoteIdx;
  try{localStorage.setItem('tracker_'+todayKey,JSON.stringify(state));}catch(e){}
}

function renderDate(){
  var d=new Date();
  var wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  document.getElementById('todayDate').textContent=d.getFullYear()+' · '+(d.getMonth()+1)+'月'+d.getDate()+'日 '+wd;
}

function renderQuote(){
  var q=QUOTES[quoteIdx%QUOTES.length];
  document.getElementById('qZh').textContent=q.zh;
  document.getElementById('qEn').textContent=q.en;
  document.getElementById('qAuthor').textContent=q.author;
}
function nextQuote(){quoteIdx=(quoteIdx+1)%QUOTES.length;renderQuote();saveState();}
function prevQuote(){quoteIdx=(quoteIdx-1+QUOTES.length)%QUOTES.length;renderQuote();saveState();}

function renderTasks(){
  var total=0,done=0;
  var container=document.getElementById('taskList');
  container.innerHTML='';
  SECTIONS.forEach(function(sec,si){
    var div=document.createElement('div');div.className='section';
    var hdr=document.createElement('div');hdr.className='section-header';
    hdr.innerHTML='<div class="section-dot" style="background:'+sec.dot+'"></div><span class="section-name">'+sec.name+'</span>';
    div.appendChild(hdr);
    sec.tasks.forEach(function(task,ti){
      total++;
      var id=si+'_'+ti,isDone=!!(state.checks&&state.checks[id]);
      if(isDone)done++;
      var card=document.createElement('div');
      card.className='task-card'+(isDone?' done':'');
      card.onclick=(function(cid,ccard){return function(){toggleTask(cid,ccard);};})(id,card);
      var tagHtml=task.tag?'<span class="task-tag tag-'+task.tag+'">'+TAG_MAP[task.tag]+'</span>':'';
      var noteHtml=task.note?'<div class="task-note">'+task.note+'</div>':'';
      card.innerHTML='<div class="task-check"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9 10.5,3" stroke="#6B8F6E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="task-body"><div class="task-time">'+(task.time||'')+'</div><div class="task-label">'+task.label+tagHtml+'</div>'+noteHtml+'</div>';
      div.appendChild(card);
    });
    container.appendChild(div);
  });
  updateProgress(done,total);
}

function toggleTask(id,card){
  if(!state.checks)state.checks={};
  state.checks[id]=!state.checks[id];
  card.classList.toggle('done',state.checks[id]);
  saveState();updateProgressFromDOM();
}

function updateProgressFromDOM(){
  var total=0,done=0;
  SECTIONS.forEach(function(sec,si){sec.tasks.forEach(function(t,ti){total++;if(state.checks&&state.checks[si+'_'+ti])done++;});});
  updateProgress(done,total);
}

function updateProgress(done,total){
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('progressText').textContent=done+' / '+total;
  document.getElementById('progressFill').style.width=pct+'%';
}

function confirmReset(){
  if(confirm('确认重置今日所有打卡记录？')){state.checks={};saveState();renderTasks();}
}

function initSummary(){
  var box=document.getElementById('summaryBox');
  box.value=state.summary||'';
  box.addEventListener('input',function(){state.summary=box.value;saveState();});
}

function openSettings(){
  document.getElementById('overlay').classList.add('open');
  var key=localStorage.getItem('qwen_api_key')||'';
  document.getElementById('apiKeyInput').value=key;
  updateKeyStatus(key);
}
function closeSettings(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSettings();}
function updateKeyStatus(key){
  var el=document.getElementById('keyStatus');
  if(key&&key.length>10){el.innerHTML='<span class="key-status key-ok">✓ Key 已配置</span>';}
  else if(key){el.innerHTML='<span class="key-status key-no">Key 太短，请检查</span>';}
  else{el.innerHTML='<span class="key-status key-no">未配置</span>';}
}
function saveApiKey(){
  var key=document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('qwen_api_key',key);
  updateKeyStatus(key);
  setTimeout(closeSettings,600);
}

async function generateAISummary(){
  var apiKey=localStorage.getItem('qwen_api_key')||'';
  if(!apiKey||apiKey.length<10){
    alert('请先点击左上角 ⚙ 设置你的通义千问 API Key');return;
  }
  var yesterdayKey=getDateKey(-1);
  var ys={};
  try{var s=localStorage.getItem('tracker_'+yesterdayKey);ys=s?JSON.parse(s):{};}catch(e){}

  var total=0,done=0,doneItems=[],missItems=[];
  SECTIONS.forEach(function(sec,si){
    sec.tasks.forEach(function(task,ti){
      total++;
      var id=si+'_'+ti;
      if(ys.checks&&ys.checks[id]){done++;doneItems.push(task.label);}
      else{missItems.push(task.label);}
    });
  });

  var pct=total?Math.round(done/total*100):0;
  var manualNote=ys.summary||'';

  var body=document.getElementById('aiBody');
  var btn=document.getElementById('aiGenBtn');
  btn.disabled=true;btn.textContent='生成中…';
  body.innerHTML='<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>AI 正在复盘昨天…</span></div>';

  var prompt='你是一个温暖真诚的生活教练。根据以下昨日打卡数据，用中文写一段温暖的每日复盘（约150字）。\n\n昨日日期：'+yesterdayKey+'\n完成率：'+done+'/'+total+'（'+pct+'%）\n完成项目：'+(doneItems.length?doneItems.join('、'):'无')+'\n未完成：'+(missItems.length?missItems.join('、'):'无')+'\n昨日手写记录：'+(manualNote||'（无）')+'\n\n请按此结构输出，不要用标题或分隔线：\n1.肯定昨天做得好的地方（具体说出来）\n2.温和指出1-2个需要改进的地方\n3.一句鼓励的话结尾，让人充满动力';

  try{
    var resp=await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+apiKey
      },
      body:JSON.stringify({
        model:'qwen-plus',
        messages:[
          {role:'system',content:'你是一个温暖真诚的生活教练，擅长用鼓励的语气帮助用户复盘每日习惯。'},
          {role:'user',content:prompt}
        ],
        max_tokens:500
      })
    });
    if(!resp.ok){var err=await resp.json();throw new Error((err.error&&err.error.message)||'HTTP '+resp.status);}
    var data=await resp.json();
    var text=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'生成失败，请重试';
    body.innerHTML='<div class="ai-text">'+text+'</div>';
    state.aiSummary=text;saveState();
  }catch(e){
    body.innerHTML='<div class="ai-placeholder">生成失败：'+e.message+'<br>请检查 API Key 或网络后重试。</div>';
  }
  btn.disabled=false;btn.textContent='重新生成';
}

function loadCached(){
  if(state.aiSummary){
    document.getElementById('aiBody').innerHTML='<div class="ai-text">'+state.aiSummary+'</div>';
    document.getElementById('aiGenBtn').textContent='重新生成';
  }
}

loadState();
renderDate();
renderQuote();
renderTasks();
initSummary();
loadCached();
</script>
</body>
